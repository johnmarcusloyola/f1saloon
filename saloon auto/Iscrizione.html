<!DOCTYPE html> 
<html lang="it"> 
    <head> 
        <meta charset="UTF-8"> 
        <title>Iscrizione Evento</title> 
        <!-- Font principale del sito -->
        <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="image/Logo.png">
    </head>
    <body class="bodyiscrizione"> 
        <div class="container"> 
            <h1 class="h1biglietti">Biglietti</h1> 
            <form action="#" method="post"> 
                 <div class="form-group"> 
                    <label for="nome">Nome</label> 
                    <input type="text" id="nome" name="nome" required> 
                </div> 
                
                <div class="form-group"> 
                    <label for="cognome">Cognome</label> 
                    <input type="text" id="cognome" name="cognome" required> 
                </div> 

                <div class="form-group"> 
                    <label for="email">Email</label> 
                    <input type="text" id="email" name="email" required> 
                </div> 
               
                <div class="form-group"> 
                    <div class="checkbox-group"> 
                        <label for="termini">Accetto i termini e le condizioni</label> 
                    </div> <input type="checkbox" name="termini" id="termini" required>
                    <div class="note">Devi accettare per completare l'iscrizione.</div>
                </div> 
                <div class="form-group"> 
                    <label for="note">Note aggiuntive</label> 
                    <textarea id="note" name="note" placeholder="Scrivi qui le tue richieste..."></textarea> 
                </div> 
                <div class="divbtn">
                    <button type="submit" class="submit-btn">Iscriviti</button> 
                </div>
            </form> 
        </div> 
    </body>
</html>
